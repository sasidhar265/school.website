services:
  postgres:
    image: postgres:16-alpine
    container_name: schoolconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: schoolconnect
      POSTGRES_USER: schoolconnect
      POSTGRES_PASSWORD: schoolconnect_local
    ports:
      - "5432:5432"
    volumes:
      - schoolconnect-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolconnect -d schoolconnect"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  schoolconnect-postgres-data:
